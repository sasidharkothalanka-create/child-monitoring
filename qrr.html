<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Child Monitoring - Godavari Pushkaralu 2027</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body {
            background: url('bgiimage.png') no-repeat center center fixed;
            background-size: cover;
            font-family: Arial, Helvetica, sans-serif;
        }

        marquee {
            color: white;
            font-weight: bold;
            font-size: 35px;
            margin-top: 20px;
        }

        .container {
            max-width: 550px;
            margin-top: 20px;
        }

        .card {
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        /* QR */

        #qrcode {
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }

        /* Camera Link */

        .camera-link {

            display: inline-block;
            text-decoration: none;
            color: #fff;
            background: #0d6efd;
            padding: 12px 22px;
            border-radius: 30px;
            font-weight: bold;
            transition: .3s;
            margin-top: 10px;

        }

        .camera-link:hover {

            background: #084298;
            transform: scale(1.05);
            color: white;

        }

        /* Camera */

        #cameraContainer {

            display: none;
            margin-top: 20px;
            text-align: center;

        }

        video {

            width: 100%;
            max-width: 360px;
            border-radius: 20px;
            border: 4px solid #0d6efd;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .3);

        }

        .camera-buttons {

            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;

        }

        .btn-camera {

            background: #28a745;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: .3s;

        }

        .btn-camera:hover {

            background: #1e7e34;
            transform: scale(1.05);

        }

        .btn-switch {

            background: #ff9800;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: .3s;

        }

        .btn-switch:hover {

            background: #ef6c00;
            transform: scale(1.05);

        }

        /* Captured Image */

        .captured-image {

            display: none;
            width: 180px;
            margin-top: 20px;
            border-radius: 15px;
            border: 4px solid #28a745;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .3);

        }

        i {
            display: block;
            text-align: center;
            margin-top: 10px;
        }
    </style>

</head>

<body>

    <h1>
        <marquee scrollamount="10">
            2K27 GODAVARI PUSHKARALU
        </marquee>
    </h1>

    <div class="container">

        <div class="card shadow p-4">

            <h3 class="text-center mb-4">
                Child Monitoring
            </h3>

            <div class="mb-3">

                <label class="form-label">
                    Child Name
                </label>

                <input type="text" id="childName" class="form-control" placeholder="Enter Child Name">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Parent Name
                </label>

                <input type="text" id="parentName" class="form-control" placeholder="Enter Parent Name">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Mobile Number
                </label>

                <input type="number" id="mobile" class="form-control" placeholder="Enter Mobile Number">

            </div>

            <div class="text-center">

                <a href="#" id="openCamera" class="camera-link">

                    📷 Capture Child Face

                </a>

            </div>

            <div id="cameraContainer">

                <video id="video" autoplay playsinline></video>

                <div class="camera-buttons">

                    <button id="captureBtn" class="btn-camera">

                        📸 Capture

                    </button>

                    <button id="switchBtn" class="btn-switch">

                        🔄 Switch Camera

                    </button>

                </div>

            </div>

            <canvas id="canvas" style="display:none;"></canvas>

            <div class="text-center">

                <img id="capturedImage" class="captured-image">

            </div>

            <button class="btn btn-primary w-100 mt-4" onclick="generateQR()">

                Generate QR Code

            </button>

            <div id="qrcode"></div>

            <i>Scan for Details</i>

        </div>

    </div>

    <script>

        let video = document.getElementById("video");
        let canvas = document.getElementById("canvas");
        let capturedImage = document.getElementById("capturedImage");

        let stream = null;
        let facingMode = "user";

        async function startCamera() {

            if (stream) {

                stream.getTracks().forEach(track => track.stop());

            }

            try {

                stream = await navigator.mediaDevices.getUserMedia({

                    video: {
                        facingMode: facingMode
                    }

                });

                video.srcObject = stream;

                document.getElementById("cameraContainer").style.display = "block";

            } catch (e) {

                alert("Unable to access camera.");

            }

        }

        document.getElementById("openCamera").addEventListener("click", function (e) {

            e.preventDefault();

            startCamera();

        });

        document.getElementById("switchBtn").addEventListener("click", function () {

            facingMode = (facingMode === "user") ? "environment" : "user";

            startCamera();

        });

        document.getElementById("captureBtn").addEventListener("click", function () {

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            let ctx = canvas.getContext("2d");

            ctx.drawImage(video, 0, 0);

            let img = canvas.toDataURL("image/png");

            capturedImage.src = img;

            capturedImage.style.display = "block";

            /* Stop camera after capture */

            stream.getTracks().forEach(track => track.stop());

            document.getElementById("cameraContainer").style.display = "none";

        });

        function generateQR() {

            let child = document.getElementById("childName").value.trim();

            let parent = document.getElementById("parentName").value.trim();

            let mobile = document.getElementById("mobile").value.trim();

            if (child == "" || parent == "" || mobile == "") {

                alert("Please fill all fields.");

                return;

            }

            if (capturedImage.src == "") {

                alert("Please capture the child's face.");

                return;

            }

            let data =
                `Child Name : ${child}

Parent Name : ${parent}

Mobile Number : ${mobile}`;

            document.getElementById("qrcode").innerHTML = "";

            new QRCode(document.getElementById("qrcode"), {

                text: data,
                width: 220,
                height: 220

            });

        }

    </script>

</body>

</html>
